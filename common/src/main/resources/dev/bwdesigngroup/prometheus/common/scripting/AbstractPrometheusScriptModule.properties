# === Counter Operations ===

createCounter.desc=Creates a new Prometheus counter metric. Counters are monotonically increasing values that only go up (e.g., total requests, errors, completed tasks).
createCounter.param.metricName=The name of the counter metric. Must match pattern [a-zA-Z_:][a-zA-Z0-9_:]* (e.g., 'http_requests_total').
createCounter.param.metricName.type=String
createCounter.param.description=Description text explaining what this counter measures. Will be displayed in Prometheus metrics output.
createCounter.param.description.type=String
createCounter.param.labelNames=List of label names for this counter (e.g., ['method', 'endpoint']). Labels allow tracking the same metric with different dimensions.
createCounter.param.labelNames.type=List
createCounter.param.errorIfExists=If True, throws an error if the metric already exists. If False, silently skips creation.
createCounter.param.errorIfExists.type=Boolean
createCounter.param.errorIfExists.default=False
createCounter.param.errorIfExists.optional=true
createCounter.returns=None

incrementCounter.desc=Increments a counter metric by the specified amount. The counter must already exist.
incrementCounter.param.metricName=The name of the counter metric to increment.
incrementCounter.param.metricName.type=String
incrementCounter.param.value=The amount to increment by. Must be >= 0.
incrementCounter.param.value.type=Double
incrementCounter.param.value.default=1.0
incrementCounter.param.value.optional=true
incrementCounter.param.labels=Dictionary of label names to values (e.g., {'method': 'GET', 'endpoint': '/api'}). Must match the labels defined when the counter was created.
incrementCounter.param.labels.type=Map
incrementCounter.param.labels.optional=true
incrementCounter.returns=None

# === Gauge Operations ===

createGauge.desc=Creates a new Prometheus gauge metric. Gauges are values that can go up or down (e.g., temperature, memory usage, active connections).
createGauge.param.metricName=The name of the gauge metric. Must match pattern [a-zA-Z_:][a-zA-Z0-9_:]*.
createGauge.param.metricName.type=String
createGauge.param.description=Description text explaining what this gauge measures.
createGauge.param.description.type=String
createGauge.param.labelNames=List of label names for this gauge.
createGauge.param.labelNames.type=List
createGauge.param.errorIfExists=If True, throws an error if the metric already exists. If False, silently skips creation.
createGauge.param.errorIfExists.type=Boolean
createGauge.param.errorIfExists.default=False
createGauge.param.errorIfExists.optional=true
createGauge.returns=None

setGauge.desc=Sets a gauge metric to a specific value, replacing any previous value.
setGauge.param.metricName=The name of the gauge metric to set.
setGauge.param.metricName.type=String
setGauge.param.value=The value to set the gauge to. Can be any numeric value.
setGauge.param.value.type=Double
setGauge.param.labels=Dictionary of label names to values. Must match the labels defined when the gauge was created.
setGauge.param.labels.type=Map
setGauge.param.labels.optional=true
setGauge.returns=None

incrementGauge.desc=Increments a gauge metric by the specified amount. Use this for cumulative changes.
incrementGauge.param.metricName=The name of the gauge metric to increment.
incrementGauge.param.metricName.type=String
incrementGauge.param.value=The amount to increment by. Can be positive or negative.
incrementGauge.param.value.type=Double
incrementGauge.param.value.default=1.0
incrementGauge.param.value.optional=true
incrementGauge.param.labels=Dictionary of label names to values.
incrementGauge.param.labels.type=Map
incrementGauge.param.labels.optional=true
incrementGauge.returns=None

decrementGauge.desc=Decrements a gauge metric by the specified amount. Use this for cumulative decreases.
decrementGauge.param.metricName=The name of the gauge metric to decrement.
decrementGauge.param.metricName.type=String
decrementGauge.param.value=The amount to decrement by. Must be positive (will be subtracted).
decrementGauge.param.value.type=Double
decrementGauge.param.value.default=1.0
decrementGauge.param.value.optional=true
decrementGauge.param.labels=Dictionary of label names to values.
decrementGauge.param.labels.type=Map
decrementGauge.param.labels.optional=true
decrementGauge.returns=None

# === Histogram Operations ===

createHistogram.desc=Creates a new Prometheus histogram metric. Histograms track distributions of values (e.g., request latencies, response sizes).
createHistogram.param.metricName=The name of the histogram metric.
createHistogram.param.metricName.type=String
createHistogram.param.description=Description text explaining what this histogram measures.
createHistogram.param.description.type=String
createHistogram.param.labelNames=List of label names for this histogram.
createHistogram.param.labelNames.type=List
createHistogram.param.buckets=Array of upper bounds for histogram buckets in ascending order.
createHistogram.param.buckets.type=Array
createHistogram.param.buckets.optional=true
createHistogram.param.errorIfExists=If True, throws an error if the metric already exists.
createHistogram.param.errorIfExists.type=Boolean
createHistogram.param.errorIfExists.default=False
createHistogram.param.errorIfExists.optional=true
createHistogram.returns=None

observeHistogram.desc=Records a value observation in a histogram metric. The value will be counted and added to the appropriate bucket.
observeHistogram.param.metricName=The name of the histogram metric to observe a value in.
observeHistogram.param.metricName.type=String
observeHistogram.param.value=The value to observe/record.
observeHistogram.param.value.type=Double
observeHistogram.param.labels=Dictionary of label names to values.
observeHistogram.param.labels.type=Map
observeHistogram.param.labels.optional=true
observeHistogram.returns=None

# === Utility Operations ===

listMetrics.desc=Lists all custom Prometheus metrics that have been created through the scripting API.
listMetrics.returns=A list of strings containing the names of all registered custom metrics, sorted alphabetically.
listMetrics.returns.type=List

removeMetric.desc=Removes a metric from the Prometheus registry. Use with caution as this will delete all data for the metric.
removeMetric.param.metricName=The name of the metric to remove from the registry.
removeMetric.param.metricName.type=String
removeMetric.returns=None

getMetricValue.desc=Gets the current value of a metric. Works for counters and gauges, but not histograms (which have multiple values).
getMetricValue.param.metricName=The name of the metric to get the value of.
getMetricValue.param.metricName.type=String
getMetricValue.param.labels=Dictionary of label names to values to identify the specific metric instance.
getMetricValue.param.labels.type=Map
getMetricValue.param.labels.optional=true
getMetricValue.returns=The current numeric value of the metric as a float.
getMetricValue.returns.type=Double