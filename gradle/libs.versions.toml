[versions]
ignition = "8.1.44"
prometheus = "0.16.0"
slf4j = "2.0.9"

[libraries]
# Ignition SDK dependencies
ignition-common = { module = "com.inductiveautomation.ignitionsdk:ignition-common", version.ref = "ignition" }
ignition-gateway-api = { module = "com.inductiveautomation.ignitionsdk:gateway-api", version.ref = "ignition" }
ignition-client-api = { module = "com.inductiveautomation.ignitionsdk:client-api", version.ref = "ignition" }
ignition-vision-api = { module = "com.inductiveautomation.ignitionsdk:vision-client-api", version.ref = "ignition" }
ignition-designer-api = { module = "com.inductiveautomation.ignitionsdk:designer-api", version.ref = "ignition" }

# Prometheus dependencies
prometheus = { module = "io.prometheus:simpleclient", version.ref = "prometheus" }
prometheus-servlet = { module = "io.prometheus:simpleclient_servlet", version.ref = "prometheus" }
prometheus-dropwizard = { module = "io.prometheus:simpleclient_dropwizard", version.ref = "prometheus" }

# Logging
slf4j-api = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }

[plugins]
ignition-module = { id = "io.ia.sdk.modl", version = "0.3.0" }